<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Conectando voce ao Telegram...</title>
  <style>
    :root {
      color-scheme: light;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Verdana, Geneva, Tahoma, sans-serif;
      background: radial-gradient(circle at 20% 20%, #ffe8f1 0%, #f9fbff 45%, #eef6ff 100%);
      color: #1a1a1a;
    }
    .card {
      width: min(520px, 92vw);
      padding: 28px 24px;
      border-radius: 20px;
      background: #ffffff;
      box-shadow: 0 12px 34px rgba(20, 35, 70, 0.12);
      text-align: center;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 1.25rem;
    }
    p {
      margin: 0;
      line-height: 1.5;
      color: #3c3c3c;
    }
    .dots {
      margin-top: 16px;
      letter-spacing: 4px;
      font-weight: 700;
      color: #0b57d0;
      animation: pulse 1.2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
  </style>

  <script>
    !function(f,b,e,v,n,t,s){
      if(f.fbq) return;
      n=f.fbq=function(){n.callMethod?n.callMethod.apply(n,arguments):n.queue.push(arguments)};
      if(!f._fbq) f._fbq=n;
      n.push=n;
      n.loaded=!0;
      n.version='2.0';
      n.queue=[];
      t=b.createElement(e); t.async=!0;
      t.src=v;
      s=b.getElementsByTagName(e)[0];
      s.parentNode.insertBefore(t,s);
    }(window, document, 'script', 'https://connect.facebook.net/en_US/fbevents.js');
  </script>
</head>
<body>
  <div class="card">
    <h1>Quase la</h1>
    <p>Estamos te redirecionando para o Telegram agora.</p>
    <p class="dots">...</p>
  </div>

  <noscript>
    <img height="1" width="1" style="display:none"
      src="https://www.facebook.com/tr?id=937881331918204&ev=PageView&noscript=1" alt="">
  </noscript>

  <script>
    const PIXEL_ID = "937881331918204";
    const TELEGRAM_BOT = "anajulbot";
    const CAPTURE_URL = "https://n8n.lindai.com.br/webhook/meta-click-anajulia";
    const REDIRECT_DELAY_MS = 2500;

    const SAFE_KEYS = [
      "utm_source",
      "utm_medium",
      "utm_campaign",
      "utm_content",
      "utm_term",
      "fbclid"
    ];

    function readCookie(name) {
      const escaped = name.replace(/[-[\]/{}()*+?.\\^$|]/g, "\\$&");
      const re = new RegExp("(?:^|; )" + escaped + "=([^;]*)");
      const m = document.cookie.match(re);
      return m ? decodeURIComponent(m[1]) : "";
    }

    function randomLeadRef() {
      const seed = Math.floor(Date.now() / 1000).toString(36);
      const arr = new Uint8Array(8);
      crypto.getRandomValues(arr);
      const rand = Array.from(arr, (v) => v.toString(16).padStart(2, "0")).join("");
      return ("l" + seed + rand).slice(0, 40);
    }

    function buildFbc(fbclid) {
      if (!fbclid) return "";
      return "fb.1." + Date.now() + "." + fbclid;
    }

    function getParam(name) {
      const v = new URLSearchParams(window.location.search).get(name);
      return v ? v.trim() : "";
    }

    function sendCapture(leadRef) {
      const params = new URLSearchParams();
      params.set("lead_ref", leadRef);
      params.set("event_source_url", window.location.origin + window.location.pathname);

      for (const key of SAFE_KEYS) {
        const value = getParam(key);
        if (value) params.set(key, value);
      }

      const fbp = readCookie("_fbp");
      const fbcCookie = readCookie("_fbc");
      const fbclid = params.get("fbclid") || "";
      const fbc = fbcCookie || buildFbc(fbclid);

      if (fbp) params.set("fbp", fbp);
      if (fbc) params.set("fbc", fbc);

      const beacon = new Image();
      beacon.referrerPolicy = "strict-origin-when-cross-origin";
      beacon.src = CAPTURE_URL + "?" + params.toString();
    }

    function redirectTelegram(leadRef) {
      const url = "https://t.me/" + TELEGRAM_BOT + "?start=" + encodeURIComponent(leadRef);
      window.location.replace(url);
    }

    (function boot() {
      const leadRef = randomLeadRef();

      fbq("init", PIXEL_ID);
      fbq("track", "PageView");
      fbq("track", "Lead", { lead_ref: leadRef }, { eventID: "lead_" + leadRef });

      sendCapture(leadRef);
      setTimeout(function() {
        redirectTelegram(leadRef);
      }, REDIRECT_DELAY_MS);
    })();
  </script>
</body>
</html>
