<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Conectando voce ao Telegram...</title>
  <style>
    :root {
      color-scheme: light;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Verdana, Geneva, Tahoma, sans-serif;
      background: radial-gradient(circle at 20% 20%, #ffe8f1 0%, #f9fbff 45%, #eef6ff 100%);
      color: #1a1a1a;
    }
    .card {
      width: min(520px, 92vw);
      padding: 28px 24px;
      border-radius: 20px;
      background: #ffffff;
      box-shadow: 0 12px 34px rgba(20, 35, 70, 0.12);
      text-align: center;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 1.25rem;
    }
    p {
      margin: 0;
      line-height: 1.5;
      color: #3c3c3c;
    }
    .dots {
      margin-top: 16px;
      letter-spacing: 4px;
      font-weight: 700;
      color: #0b57d0;
      animation: pulse 1.2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
  </style>

  <script>
    !function(f,b,e,v,n,t,s){
      if(f.fbq) return;
      n=f.fbq=function(){n.callMethod?n.callMethod.apply(n,arguments):n.queue.push(arguments)};
      if(!f._fbq) f._fbq=n;
      n.push=n;
      n.loaded=!0;
      n.version='2.0';
      n.queue=[];
      t=b.createElement(e); t.async=!0;
      t.src=v;
      s=b.getElementsByTagName(e)[0];
      s.parentNode.insertBefore(t,s);
    }(window, document, 'script', 'https://connect.facebook.net/en_US/fbevents.js');
  </script>
</head>
<body>
  <div class="card">
    <h1>Quase la</h1>
    <p>Estamos te redirecionando para o Telegram agora.</p>
    <p class="dots">...</p>
  </div>

  <noscript>
    <img height="1" width="1" style="display:none"
      src="https://www.facebook.com/tr?id=937881331918204&ev=PageView&noscript=1" alt="">
    <img height="1" width="1" style="display:none"
      src="https://www.facebook.com/tr?id=910186264943968&ev=PageView&noscript=1" alt="">
  </noscript>

  <script>
    const PIXEL_IDS = ["937881331918204", "910186264943968"];
    const TELEGRAM_BOT = "anajulbot";
    const CAPTURE_URL = "https://n8n.lindai.com.br/webhook/meta-click-anajulia";
    const REDIRECT_DELAY_MS = 2500;
    const COOKIE_MAX_AGE_DAYS = 90;
    const CAPTURE_FALLBACK_DELAY_MS = 120;
    const CAPTURE_IMG_TIMEOUT_MS = 700;

    const SAFE_KEYS = [
      "utm_source",
      "utm_medium",
      "utm_campaign",
      "utm_content",
      "utm_term",
      "fbclid"
    ];

    function readCookie(name) {
      const escaped = name.replace(/[-[\]/{}()*+?.\\^$|]/g, "\\$&");
      const re = new RegExp("(?:^|; )" + escaped + "=([^;]*)");
      const m = document.cookie.match(re);
      return m ? decodeURIComponent(m[1]) : "";
    }

    function writeCookie(name, value, days) {
      if (!name || !value) return;
      const maxAge = Math.max(0, Math.floor(days * 24 * 60 * 60));
      document.cookie =
        name +
        "=" +
        encodeURIComponent(value) +
        "; Max-Age=" +
        maxAge +
        "; Path=/; SameSite=Lax";
    }

    function randomLeadRef() {
      const seed = Math.floor(Date.now() / 1000).toString(36);
      let rand = "";
      try {
        const arr = new Uint8Array(8);
        crypto.getRandomValues(arr);
        rand = Array.from(arr, function(v) { return v.toString(16).padStart(2, "0"); }).join("");
      } catch (e) {
        rand = Math.random().toString(16).slice(2) + Math.random().toString(16).slice(2);
      }
      return ("l" + seed + rand).slice(0, 40);
    }

    function buildFbc(fbclid) {
      if (!fbclid) return "";
      return "fb.1." + Date.now() + "." + fbclid;
    }

    function buildFbp() {
      return "fb.1." + Date.now() + "." + Math.floor(Math.random() * 10000000000);
    }

    function getParam(name) {
      const v = new URLSearchParams(window.location.search).get(name);
      return v ? v.trim() : "";
    }

    function sendCaptureFetch(url) {
      if (!window.fetch) return;
      try {
        fetch(url, {
          method: "GET",
          mode: "no-cors",
          cache: "no-store",
          keepalive: true,
          credentials: "omit"
        }).catch(function() {});
      } catch (e) {}
    }

    function sendCaptureImage(url) {
      return new Promise(function(resolve) {
        const img = new Image();
        let done = false;

        function finish(ok) {
          if (done) return;
          done = true;
          resolve(ok);
        }

        img.referrerPolicy = "strict-origin-when-cross-origin";
        img.onload = function() { finish(true); };
        img.onerror = function() { finish(false); };
        setTimeout(function() { finish(false); }, CAPTURE_IMG_TIMEOUT_MS);
        img.src = url;
      });
    }

    function sendCapture(leadRef, eventId) {
      const params = new URLSearchParams();
      params.set("lead_ref", leadRef);
      if (eventId) params.set("event_id", eventId);
      params.set("event_source_url", window.location.origin + window.location.pathname);

      for (const key of SAFE_KEYS) {
        const value = getParam(key);
        if (value) params.set(key, value);
      }

      let fbp = readCookie("_fbp");
      const fbcCookie = readCookie("_fbc");
      const fbclid = params.get("fbclid") || "";
      let fbc = fbcCookie;

      if (!fbp) {
        fbp = buildFbp();
        writeCookie("_fbp", fbp, COOKIE_MAX_AGE_DAYS);
      }
      if (!fbc && fbclid) {
        fbc = buildFbc(fbclid);
      }
      if (fbc && !fbcCookie) {
        writeCookie("_fbc", fbc, COOKIE_MAX_AGE_DAYS);
      }

      if (fbp) params.set("fbp", fbp);
      if (fbc) params.set("fbc", fbc);

      const baseUrl = CAPTURE_URL + "?" + params.toString();
      sendCaptureFetch(baseUrl);
      setTimeout(function() {
        sendCaptureImage(baseUrl + "&transport=img");
      }, CAPTURE_FALLBACK_DELAY_MS);
    }

    function redirectTelegram(leadRef) {
      const url = "https://t.me/" + TELEGRAM_BOT + "?start=" + encodeURIComponent(leadRef);
      window.location.replace(url);
    }

    function initPixels() {
      for (const pixelId of PIXEL_IDS) {
        if (pixelId) fbq("init", pixelId);
      }
    }

    function trackAllPixels(eventName, params, options) {
      for (const pixelId of PIXEL_IDS) {
        if (!pixelId) continue;
        if (options) {
          fbq("trackSingle", pixelId, eventName, params || {}, options);
        } else {
          fbq("trackSingle", pixelId, eventName, params || {});
        }
      }
    }

    (function boot() {
      const leadRef = randomLeadRef();
      const leadEventId = "lead_" + leadRef;
      let redirected = false;

      function safeRedirect() {
        if (redirected) return;
        redirected = true;
        redirectTelegram(leadRef);
      }

      initPixels();
      trackAllPixels("PageView");
      trackAllPixels("Lead", { lead_ref: leadRef }, { eventID: leadEventId });

      sendCapture(leadRef, leadEventId);
      setTimeout(safeRedirect, REDIRECT_DELAY_MS);
    })();
  </script>
</body>
</html>
